{% extends "base.html" %}
{% block title %}Log in · Recruitment Portal{% endblock %}
{% block content %}
<h1>Log in</h1>
<form method="post" class="form">
  <label>Email
    <input type="email" name="email" value="{{ email or '' }}" required>
  </label>
  <label>Password
    <input type="password" name="password" required>
  </label>
  <button class="btn" type="submit">Log in</button>
</form>
<p>No account yet? <a href="{{ url_for('register') }}">Register</a>.</p>
{% endblock %}
