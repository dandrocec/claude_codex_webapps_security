{% extends "base.html" %}
{% block title %}{{ "Edit" if recipe else "Add" }} Recipe{% endblock %}
{% block content %}
  <h1>{{ "Edit Recipe" if recipe else "Add Recipe" }}</h1>
  <form method="post" action="{{ action }}" enctype="multipart/form-data" class="form">
    <label>
      Title
      <input type="text" name="title" required value="{{ form.title or '' }}">
    </label>

    <label>
      Ingredients
      <textarea name="ingredients" rows="6" required placeholder="One per line...">{{ form.ingredients or '' }}</textarea>
    </label>

    <label>
      Steps
      <textarea name="steps" rows="8" required placeholder="Describe the steps...">{{ form.steps or '' }}</textarea>
    </label>

    <label>
      Photo (optional)
      <input type="file" name="photo" accept="image/*">
    </label>

    {% if recipe and recipe.photo %}
      <div class="current-photo">
        <img src="{{ url_for('static', filename='uploads/' ~ recipe.photo) }}" alt="current photo">
        <label class="inline">
          <input type="checkbox" name="remove_photo" value="1"> Remove current photo
        </label>
      </div>
    {% endif %}

    <div class="actions">
      <button class="btn" type="submit">Save</button>
      <a class="btn btn-secondary" href="{{ url_for('index') }}">Cancel</a>
    </div>
  </form>
{% endblock %}
