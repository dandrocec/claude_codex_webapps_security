{% extends "base.html" %}
{% block title %}Log in · Microblog{% endblock %}
{% block content %}
<section class="form-card">
  <h1>Log in</h1>
  {% if notice == 'registered' %}<div class="alert notice">Account created — please log in.</div>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Username
      <input type="text" name="username" autocomplete="username" required maxlength="30">
    </label>
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
  <p class="muted">No account? <a href="/register">Register</a></p>
</section>
{% endblock %}
