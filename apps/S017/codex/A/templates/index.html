<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="converter">
        <div class="intro">
          <p class="eyebrow">Fixed-rate calculator</p>
          <h1>Currency Converter</h1>
        </div>

        <form method="post" class="converter-form">
          <label for="amount">Amount</label>
          <input
            id="amount"
            name="amount"
            type="number"
            min="0"
            step="0.01"
            value="{{ form.amount }}"
            required
          >

          <div class="currency-row">
            <div>
              <label for="source">From</label>
              <select id="source" name="source">
                {% for code in currencies %}
                  <option value="{{ code }}" {% if form.source == code %}selected{% endif %}>
                    {{ code }} - {{ currency_names[code] }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div>
              <label for="target">To</label>
              <select id="target" name="target">
                {% for code in currencies %}
                  <option value="{{ code }}" {% if form.target == code %}selected{% endif %}>
                    {{ code }} - {{ currency_names[code] }}
                  </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <button type="submit">Convert</button>
        </form>

        {% if error %}
          <p class="message error">{{ error }}</p>
        {% endif %}

        {% if result %}
          <div class="result" aria-live="polite">
            <span>{{ result.amount }} {{ result.source }}</span>
            <strong>{{ result.converted }} {{ result.target }}</strong>
          </div>
        {% endif %}
      </section>
    </main>
  </body>
</html>
