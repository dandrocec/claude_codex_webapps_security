<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Currency Converter</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f4f5f7;
      margin: 0;
      padding: 2rem;
      color: #1f2933;
    }
    .card {
      max-width: 420px;
      margin: 3rem auto;
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
    h1 { margin-top: 0; font-size: 1.5rem; }
    label { display: block; margin: 1rem 0 0.35rem; font-weight: 600; }
    input, select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #cbd2d9;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .row { display: flex; gap: 1rem; }
    .row > div { flex: 1; }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: #3e7bfa;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2f6ae8; }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #e8f0fe;
      border-radius: 8px;
      font-size: 1.1rem;
      text-align: center;
    }
    .result strong { font-size: 1.3rem; }
    .error {
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      background: #fdecea;
      color: #b71c1c;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Currency Converter</h1>
    <form method="post">
      <label for="amount">Amount</label>
      <input type="number" id="amount" name="amount" step="any" min="0"
             value="{{ form.amount }}" placeholder="100" required>

      <div class="row">
        <div>
          <label for="source">From</label>
          <select id="source" name="source">
            {% for c in currencies %}
              <option value="{{ c }}" {% if form.source == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="target">To</label>
          <select id="target" name="target">
            {% for c in currencies %}
              <option value="{{ c }}" {% if form.target == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <button type="submit">Convert</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if result %}
      <div class="result">
        {{ "%.2f"|format(result.amount) }} {{ result.source }} =
        <strong>{{ "%.2f"|format(result.converted) }} {{ result.target }}</strong>
      </div>
    {% endif %}
  </div>
</body>
</html>
