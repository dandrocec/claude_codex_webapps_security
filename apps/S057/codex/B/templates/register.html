{% extends "base.html" %}
{% block title %}Register | Secure Shop{% endblock %}
{% block content %}
  <section class="auth-panel">
    <h1>Create account</h1>
    <form method="post" action="{{ url_for('register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>
        Username
        <input name="username" minlength="3" maxlength="32" pattern="[A-Za-z0-9_]+" autocomplete="username" required>
      </label>
      <label>
        Password
        <input type="password" name="password" minlength="12" maxlength="128" autocomplete="new-password" required>
      </label>
      <button type="submit">Register</button>
    </form>
  </section>
{% endblock %}
