<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Simple Shop{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('catalogue') }}">Simple Shop</a>
    <nav>
      <a href="{{ url_for('catalogue') }}">Catalogue</a>
      <a href="{{ url_for('cart') }}">Cart ({{ cart.count if cart else 0 }})</a>
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
