<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Simple Shop{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="{{ url_for('catalogue') }}">🛍️ Simple Shop</a>
    <nav>
      <a href="{{ url_for('catalogue') }}">Catalogue</a>
      <a href="{{ url_for('cart') }}">Cart ({{ cart_count }})</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Demo online shop &middot; Flask + SQLite</p>
  </footer>
</body>
</html>
