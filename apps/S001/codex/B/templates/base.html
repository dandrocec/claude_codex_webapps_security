<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Greeting App{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7fa;
        color: #1f2937;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(92vw, 420px);
        background: #ffffff;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 12px 34px rgba(31, 41, 55, 0.08);
      }

      h1 {
        margin: 0 0 18px;
        font-size: 1.7rem;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      input[type="text"] {
        box-sizing: border-box;
        width: 100%;
        min-height: 42px;
        border: 1px solid #aeb7c4;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 1rem;
      }

      button,
      input[type="submit"],
      .button {
        display: inline-block;
        margin-top: 16px;
        border: 0;
        border-radius: 6px;
        background: #0f766e;
        color: #ffffff;
        padding: 10px 16px;
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .errors {
        margin: 10px 0 0;
        padding-left: 20px;
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
