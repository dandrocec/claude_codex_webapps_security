{% extends "base.html" %}
{% block title %}Log in · Flask Blog{% endblock %}
{% block content %}
  <h1>Log in</h1>
  <div class="card">
    <form method="post">
      <label for="username">Username</label>
      <input id="username" name="username" autofocus required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>
      <div style="margin-top:1rem"><button class="btn" type="submit">Log in</button></div>
    </form>
  </div>
  <p class="muted">No account? <a href="{{ url_for('register') }}">Register here</a>.</p>
  <p class="muted">Demo logins (password <code>password</code>):
     <code>reader</code>, <code>author</code>, <code>editor</code>.</p>
{% endblock %}
