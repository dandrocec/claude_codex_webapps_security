{% extends "base.html" %}
{% block title %}Admin login{% endblock %}
{% block content %}
<h1>Admin login</h1>
<form method="post" action="{{ url_for('login') }}" class="card" autocomplete="off">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="username">Username</label>
  <input id="username" name="username" type="text" maxlength="100" required autofocus>
  <label for="password">Password</label>
  <input id="password" name="password" type="password" maxlength="200" required>
  <button type="submit">Log in</button>
</form>
{% endblock %}
