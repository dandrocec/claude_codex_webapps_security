<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Identity Provider" }}</title>
  <style>
    :root { color-scheme: light; font-family: Arial, sans-serif; }
    body { margin: 0; background: #f6f7f9; color: #1f2933; }
    header { background: #17324d; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    main { max-width: 960px; margin: 32px auto; padding: 0 18px; }
    a { color: #0b5cad; }
    .panel, table { background: white; border: 1px solid #d8dee4; border-radius: 8px; }
    .panel { padding: 22px; margin-bottom: 18px; }
    label { display: block; margin: 12px 0 6px; font-weight: 700; }
    input, select { box-sizing: border-box; width: 100%; padding: 10px; border: 1px solid #b8c2cc; border-radius: 6px; font: inherit; }
    button { margin-top: 14px; background: #0b5cad; color: white; border: 0; border-radius: 6px; padding: 10px 14px; font: inherit; cursor: pointer; }
    button.secondary { background: #52606d; }
    .error { color: #a61b1b; font-weight: 700; }
    .secret { word-break: break-all; background: #f1f5f9; padding: 10px; border-radius: 6px; }
    table { width: 100%; border-collapse: collapse; overflow: hidden; }
    th, td { text-align: left; border-bottom: 1px solid #e4e7eb; padding: 10px; vertical-align: top; }
    th { background: #eef2f7; }
    .inline { display: inline; }
  </style>
</head>
<body>
  <header>
    <strong>Identity Provider</strong>
    {% if user %}
      <form method="post" action="/logout" class="inline">
        <input type="hidden" name="csrf" value="{{ csrf_token }}">
        <button class="secondary" type="submit">Sign out</button>
      </form>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
