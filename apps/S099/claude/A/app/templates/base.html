<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Identity Provider{% endblock %}</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#e2e8f0; --muted:#94a3b8; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height:100vh; }
    .wrap { max-width: 880px; margin: 0 auto; padding: 2rem 1.25rem; }
    .center { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background: var(--card); border-radius: 14px; padding: 2rem; width:100%;
            box-shadow: 0 10px 40px rgba(0,0,0,.35); }
    h1 { margin-top:0; font-size:1.4rem; }
    label { display:block; font-size:.8rem; color:var(--muted); margin:.75rem 0 .25rem; }
    input, textarea { width:100%; padding:.6rem .75rem; border-radius:8px; border:1px solid #334155;
            background:#0b1220; color:var(--text); font-size:.95rem; font-family:inherit; }
    button { margin-top:1rem; background:var(--accent); color:#fff; border:0; padding:.65rem 1.1rem;
            border-radius:8px; font-size:.95rem; cursor:pointer; }
    button:hover { filter:brightness(1.1); }
    button.danger { background:var(--danger); margin:0; padding:.4rem .7rem; font-size:.8rem; }
    .error { background:#7f1d1d; color:#fecaca; padding:.6rem .8rem; border-radius:8px; margin-bottom:1rem; font-size:.9rem; }
    .muted { color:var(--muted); font-size:.85rem; }
    table { width:100%; border-collapse:collapse; margin-top:1rem; }
    th, td { text-align:left; padding:.6rem .5rem; border-bottom:1px solid #334155; font-size:.88rem; vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    code { background:#0b1220; padding:.15rem .4rem; border-radius:5px; font-size:.82rem; word-break:break-all; }
    .topbar { display:flex; justify-content:space-between; align-items:center; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
