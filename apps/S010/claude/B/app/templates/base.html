<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Secure File Upload{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #1b1b1b; }
    nav { display: flex; gap: 1rem; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: .75rem; margin-bottom: 1.5rem; }
    nav .spacer { flex: 1; }
    a { color: #1357b6; }
    .error { background: #fdecea; border: 1px solid #f5c6cb; color: #842029; padding: .6rem .8rem; border-radius: 6px; }
    form.card { display: flex; flex-direction: column; gap: .75rem; max-width: 360px; }
    label { font-weight: 600; font-size: .9rem; }
    input[type=text], input[type=password], input[type=file] { padding: .5rem; border: 1px solid #bbb; border-radius: 6px; width: 100%; box-sizing: border-box; }
    button { padding: .55rem 1rem; border: 0; border-radius: 6px; background: #1357b6; color: #fff; cursor: pointer; font-size: .95rem; }
    button.link { background: none; color: #1357b6; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid #eee; }
    .muted { color: #666; font-size: .85rem; }
  </style>
</head>
<body>
  <nav>
    <strong>Secure File Upload</strong>
    <div class="spacer"></div>
    {% if user %}
      <a href="/files">My files</a>
      <a href="/upload">Upload</a>
      <span class="muted">{{ user["username"] }}</span>
      <form action="/logout" method="post" style="display:inline">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="link">Log out</button>
      </form>
    {% else %}
      <a href="/login">Log in</a>
      <a href="/register">Register</a>
    {% endif %}
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
