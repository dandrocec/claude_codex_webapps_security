<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin Dashboard{% endblock %}</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --muted:#94a3b8; --fg:#e2e8f0;
            --accent:#3b82f6; --danger:#ef4444; --ok:#22c55e; --border:#334155; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, Segoe UI, Roboto, sans-serif;
           background:var(--bg); color:var(--fg); }
    header { display:flex; justify-content:space-between; align-items:center;
             padding:1rem 1.5rem; background:var(--card);
             border-bottom:1px solid var(--border); }
    header h1 { font-size:1.1rem; margin:0; }
    main { max-width:1000px; margin:0 auto; padding:1.5rem; }
    a { color:var(--accent); text-decoration:none; }
    .card { background:var(--card); border:1px solid var(--border);
            border-radius:10px; padding:1.25rem; margin-bottom:1.25rem; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
             gap:1rem; }
    .stat { text-align:center; }
    .stat .n { font-size:2rem; font-weight:700; }
    .stat .l { color:var(--muted); font-size:.85rem; text-transform:uppercase; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:.6rem .5rem; text-align:left; border-bottom:1px solid var(--border); }
    th { color:var(--muted); font-size:.8rem; text-transform:uppercase; }
    .badge { padding:.15rem .5rem; border-radius:999px; font-size:.75rem; }
    .badge.ok { background:rgba(34,197,94,.15); color:var(--ok); }
    .badge.off { background:rgba(239,68,68,.15); color:var(--danger); }
    .badge.admin { background:rgba(59,130,246,.15); color:var(--accent); }
    .btn { display:inline-block; border:1px solid var(--border); background:#0b1220;
           color:var(--fg); padding:.45rem .8rem; border-radius:8px; cursor:pointer;
           font-size:.85rem; }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn.danger { color:var(--danger); border-color:var(--danger); }
    .btn:hover { filter:brightness(1.1); }
    form.inline { display:inline; }
    label { display:block; margin:.75rem 0 .25rem; font-size:.9rem; color:var(--muted); }
    input[type=text], input[type=email], input[type=password] {
        width:100%; padding:.55rem; border-radius:8px; border:1px solid var(--border);
        background:#0b1220; color:var(--fg); }
    .check { display:flex; align-items:center; gap:.5rem; margin-top:.75rem; }
    .check input { width:auto; }
    .err { color:var(--danger); font-size:.82rem; margin-top:.25rem; }
    .flash { padding:.7rem 1rem; border-radius:8px; margin-bottom:1rem; }
    .flash.error { background:rgba(239,68,68,.15); color:var(--danger); }
    .flash.success { background:rgba(34,197,94,.15); color:var(--ok); }
    .muted { color:var(--muted); font-size:.85rem; }
    .row-actions { white-space:nowrap; }
  </style>
</head>
<body>
  <header>
    <h1>🛡️ Admin Dashboard</h1>
    <div>
      {% if current_user %}
        <span class="muted">{{ current_user["username"] }}</span>
        <form class="inline" method="post" action="{{ url_for('logout') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="btn" type="submit">Sign out</button>
        </form>
      {% endif %}
    </div>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
