{% extends "base.html" %}
{% block title %}{{ 'Edit user' if mode == 'edit' else 'New user' }} — Admin{% endblock %}
{% block content %}
{% set u = form if form else {} %}
<div class="page-head">
  <h1>{{ 'Edit user' if mode == 'edit' else 'Create user' }}</h1>
  <a class="btn btn-ghost" href="{{ url_for('dashboard') }}">← Back</a>
</div>

<div class="card form-card">
  <form method="post">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" required
           value="{{ u.username if u.username is defined else (user.username if user) }}">

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required
           value="{{ u.email if u.email is defined else (user.email if user) }}">

    <label for="password">Password{% if mode == 'edit' %} <span class="muted small">(leave blank to keep current)</span>{% endif %}</label>
    <input id="password" name="password" type="password"
           {{ 'required' if mode == 'create' }} minlength="6">

    <label class="checkbox">
      <input type="checkbox" name="is_admin" value="1"
             {{ 'checked' if (u.is_admin if u.is_admin is defined else (user.is_admin if user)) }}>
      Grant admin privileges
    </label>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit">{{ 'Save changes' if mode == 'edit' else 'Create user' }}</button>
      <a class="btn btn-ghost" href="{{ url_for('dashboard') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
