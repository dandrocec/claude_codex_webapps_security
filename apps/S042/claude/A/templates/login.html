{% extends "base.html" %}
{% block title %}Author login &middot; The Daily Flask{% endblock %}
{% block content %}
    <h1>Author login</h1>
    <form method="post">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Log in</button>
    </form>
    <p style="margin-top:1rem;font-family:system-ui,sans-serif;font-size:.9rem;">
        No account yet? <a href="{{ url_for('register') }}">Register as an author</a>.
    </p>
{% endblock %}
