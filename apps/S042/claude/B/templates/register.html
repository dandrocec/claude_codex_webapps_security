{% extends "base.html" %}
{% block title %}Register — The Daily Flask{% endblock %}
{% block content %}
  <h1>Create an author account</h1>
  <form method="post" action="{{ url_for('register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Username
      <input type="text" name="username" value="{{ username }}" minlength="3" maxlength="30"
             pattern="[A-Za-z0-9_]+" autocomplete="username" required>
      <small class="hint">3–30 characters: letters, digits or underscore.</small>
    </label>
    <label>Password
      <input type="password" name="password" minlength="8" maxlength="128"
             autocomplete="new-password" required>
      <small class="hint">At least 8 characters.</small>
    </label>
    <button type="submit" class="button">Register</button>
  </form>
  <p>Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
{% endblock %}
