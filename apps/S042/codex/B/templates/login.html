{% extends "base.html" %}
{% block title %}Log In · Newsroom{% endblock %}
{% block content %}
<section class="form-panel">
    <h1>Log In</h1>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="username">Username</label>
        <input id="username" name="username" required maxlength="32" autocomplete="username">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="12" maxlength="256" autocomplete="current-password">
        <button type="submit">Log in</button>
    </form>
</section>
{% endblock %}
