{% extends "base.html" %}
{% block title %}QR Code Result{% endblock %}
{% block content %}
  <section class="panel result-grid">
    <div>
      <h1>QR code ready</h1>
      <p class="content-preview">{{ qr["content"] }}</p>
      <div class="actions">
        <a class="button" href="{{ url_for('download_qr', qr_id=qr['id']) }}">Download PNG</a>
        <a class="button secondary" href="{{ url_for('dashboard') }}">Create another</a>
      </div>
    </div>
    <div class="qr-preview">
      <img src="{{ image_uri }}" alt="Generated QR code">
    </div>
  </section>
{% endblock %}
