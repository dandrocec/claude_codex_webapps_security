{% extends "base.html" %}
{% block title %}Sign in · Scheduler{% endblock %}
{% block content %}
<section class="panel narrow">
    <h1>Sign in</h1>
    <form method="post">
        <label>
            Email
            <input type="email" name="email" required>
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Sign in</button>
    </form>
</section>
{% endblock %}
