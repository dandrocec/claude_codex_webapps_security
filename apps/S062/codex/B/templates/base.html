<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Helpdesk{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --panel: #ffffff;
        --line: #d9ded6;
        --text: #1d2520;
        --muted: #637066;
        --accent: #0b6b58;
        --danger: #a33232;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      nav {
        max-width: 1040px;
        margin: 0 auto;
        padding: 14px 18px;
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
      }
      nav a, .link-button {
        color: var(--accent);
        font-weight: 650;
        text-decoration: none;
      }
      .link-button {
        border: 0;
        background: transparent;
        padding: 0;
        cursor: pointer;
        font: inherit;
      }
      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 24px 18px 56px;
      }
      .auth, .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }
      .auth { max-width: 460px; }
      h1 { font-size: 1.65rem; margin: 0 0 18px; }
      h2 { font-size: 1.15rem; margin: 0 0 12px; }
      label { display: block; font-weight: 650; margin: 14px 0 6px; }
      input, textarea, select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 11px;
        font: inherit;
        background: #fff;
        color: var(--text);
      }
      textarea { min-height: 140px; resize: vertical; }
      button, .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        padding: 9px 14px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }
      .button.secondary { background: #4f5f57; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin-top: 16px; }
      .grid { display: grid; gap: 14px; }
      .ticket-list { display: grid; gap: 10px; }
      .ticket-row {
        display: grid;
        gap: 6px;
        padding: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .meta { color: var(--muted); font-size: .92rem; }
      .status {
        display: inline-block;
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 9px;
        background: #eef4f0;
        color: #29463b;
        font-size: .86rem;
        font-weight: 700;
      }
      .body-text { white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.5; }
      .reply {
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }
      .flash {
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 14px;
        background: #eaf5ef;
        border: 1px solid #bcd7c9;
      }
      .flash.error {
        background: #fff0f0;
        border-color: #e4b8b8;
        color: var(--danger);
      }
      @media (min-width: 760px) {
        .agent-tools {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 14px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a href="{{ url_for('tickets') }}">Helpdesk</a>
        <div>
          {% if g.user %}
            <span class="meta">{{ g.user.name }} · {{ g.user.role }}</span>
            <form action="{{ url_for('logout') }}" method="post" style="display:inline; margin-left: 12px;">
              <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
              <button class="link-button" type="submit">Sign out</button>
            </form>
          {% else %}
            <a href="{{ url_for('login') }}">Sign in</a>
          {% endif %}
        </div>
      </nav>
    </header>
    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
