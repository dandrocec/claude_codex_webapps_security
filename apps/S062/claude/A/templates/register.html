{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card" style="max-width: 380px; margin: 0 auto;">
  <h1>Create a customer account</h1>
  <form method="post">
    <label for="username">Username</label>
    <input id="username" name="username" autofocus style="width:100%">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" style="width:100%">
    <div style="margin-top:16px"><button class="btn" type="submit">Register</button></div>
  </form>
  <p class="muted" style="margin-top:16px">
    Already registered? <a href="{{ url_for('login') }}">Log in</a>.
  </p>
</div>
{% endblock %}
