{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="card" style="max-width: 380px; margin: 0 auto;">
  <h1>Log in</h1>
  <form method="post">
    <label for="username">Username</label>
    <input id="username" name="username" autofocus style="width:100%">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" style="width:100%">
    <div style="margin-top:16px"><button class="btn" type="submit">Log in</button></div>
  </form>
  <p class="muted" style="margin-top:16px">
    No account? <a href="{{ url_for('register') }}">Register as a customer</a>.
  </p>
  <p class="muted">
    Demo logins — customer: <code>alice / password</code>, agent: <code>agent / password</code>.
  </p>
</div>
{% endblock %}
