{% extends "base.html" %}
{% block title %}Login — Nimbus Store{% endblock %}
{% block content %}
  <div class="card form-card">
    <h1 style="margin-top:0">Log in</h1>
    <form method="post" action="{{ url_for('login') }}">
      {% if request.args.get('next') %}<input type="hidden" name="next" value="{{ request.args.get('next') }}">{% endif %}
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button class="btn btn-block" type="submit">Log in</button>
    </form>
    <p class="muted" style="text-align:center; margin-top:16px">
      No account? <a href="{{ url_for('register') }}">Sign up</a>
    </p>
  </div>
{% endblock %}
