{% extends "base.html" %}
{% block title %}Log in &middot; Tiny Shop{% endblock %}
{% block content %}
  <h1>Log in</h1>
  <form method="post" action="{{ url_for('auth.login') }}" class="stack">
    {{ form.csrf_token }}
    <label>{{ form.email.label }} {{ form.email(autocomplete="email") }}</label>
    {% for e in form.email.errors %}<span class="err">{{ e }}</span>{% endfor %}
    <label>{{ form.password.label }} {{ form.password(autocomplete="current-password") }}</label>
    {% for e in form.password.errors %}<span class="err">{{ e }}</span>{% endfor %}
    <button class="btn primary" type="submit">Log in</button>
  </form>
  <p>No account? <a href="{{ url_for('auth.register') }}">Register</a>.</p>
{% endblock %}
