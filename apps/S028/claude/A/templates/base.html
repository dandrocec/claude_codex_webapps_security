<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Notes{% endblock %}</title>
  <style>
    :root { --accent: #2563eb; --border: #e2e8f0; --muted: #64748b; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0; background: #f8fafc; color: #0f172a;
    }
    header {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    }
    header a { color: var(--accent); text-decoration: none; font-weight: 600; }
    header .nav { display: flex; gap: 1rem; align-items: center; }
    main { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    .flash {
      background: #fef9c3; border: 1px solid #fde047; color: #713f12;
      padding: 0.6rem 0.9rem; border-radius: 6px; margin-bottom: 1rem;
    }
    .card {
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem 1.25rem; margin-bottom: 1rem;
    }
    .card h3 { margin: 0 0 0.4rem; }
    .card p { margin: 0 0 0.75rem; white-space: pre-wrap; color: #334155; }
    .actions { display: flex; gap: 0.5rem; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
    input[type=text], input[type=password], textarea {
      width: 100%; padding: 0.55rem 0.7rem; border: 1px solid var(--border);
      border-radius: 6px; font-size: 1rem; font-family: inherit;
    }
    textarea { min-height: 160px; resize: vertical; }
    button, .btn {
      display: inline-block; cursor: pointer; border: none; border-radius: 6px;
      padding: 0.5rem 0.9rem; font-size: 0.95rem; text-decoration: none;
      background: var(--accent); color: #fff;
    }
    .btn.secondary { background: #e2e8f0; color: #0f172a; }
    .btn.danger { background: #dc2626; }
    .muted { color: var(--muted); }
    form.inline { display: inline; }
  </style>
</head>
<body>
  <header>
    <a href="{{ url_for('index') }}">📝 Notes</a>
    <div class="nav">
      {% if g.user %}
        <span class="muted">{{ g.user.username }}</span>
        <a href="{{ url_for('logout') }}">Log out</a>
      {% else %}
        <a href="{{ url_for('login') }}">Log in</a>
        <a href="{{ url_for('register') }}">Register</a>
      {% endif %}
    </div>
  </header>
  <main>
    {% with messages = get_flashed_messages() %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
