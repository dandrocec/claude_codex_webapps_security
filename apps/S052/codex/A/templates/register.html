{% extends "base.html" %}

{% block title %}Register - Support Tickets{% endblock %}

{% block content %}
  <section class="auth-panel">
    <h1>Create account</h1>
    <form method="post" class="form">
      <label>
        Username
        <input name="username" maxlength="80" autocomplete="username" required>
      </label>
      <label>
        Password
        <input type="password" name="password" minlength="8" autocomplete="new-password" required>
      </label>
      <label>
        Confirm password
        <input type="password" name="confirm_password" minlength="8" autocomplete="new-password" required>
      </label>
      <button class="button" type="submit">Create account</button>
    </form>
    <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
  </section>
{% endblock %}
