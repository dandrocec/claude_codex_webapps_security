{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="card">
  <h1>Log in</h1>
  <form method="post">
    <label for="username">Username</label>
    <input id="username" name="username" autofocus required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>
    <p><button class="btn" type="submit">Log in</button></p>
  </form>
  <p class="muted">No account? <a class="link" href="{{ url_for('register') }}">Register here</a>.</p>
</div>
{% endblock %}
