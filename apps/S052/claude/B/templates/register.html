{% extends "base.html" %}
{% from "_formfield.html" import field %}
{% block title %}Register{% endblock %}
{% block content %}
  <h1>Create an account</h1>
  <form method="post" action="{{ url_for('register') }}" class="card" novalidate>
    {{ form.csrf_token }}
    {{ field(form.username) }}
    {{ field(form.password) }}
    {{ field(form.confirm) }}
    <button type="submit" class="primary">Register</button>
  </form>
  <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
{% endblock %}
