{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
  <h1>Log in</h1>
  <form method="post" class="stacked">
    {{ form.csrf_token }}
    <label>{{ form.email.label }} {{ form.email(maxlength=255) }}</label>
    {% for e in form.email.errors %}<span class="field-error">{{ e }}</span>{% endfor %}

    <label>{{ form.password.label }} {{ form.password() }}</label>
    {% for e in form.password.errors %}<span class="field-error">{{ e }}</span>{% endfor %}

    {{ form.submit(class="btn") }}
  </form>
  <p>No account? <a href="{{ url_for('register') }}">Register</a>.</p>
{% endblock %}
