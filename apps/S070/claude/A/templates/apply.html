{% extends "base.html" %}
{% block title %}Apply: {{ job.title }}{% endblock %}
{% block content %}
  <h1>Apply for {{ job.title }}</h1>
  <p class="muted">{{ job.employer.name }}{% if job.location %} &middot; {{ job.location }}{% endif %}</p>
  <div class="card" style="max-width:620px;">
    <form method="post" enctype="multipart/form-data">
      <label for="cover_letter">Cover letter</label>
      <textarea id="cover_letter" name="cover_letter"
                placeholder="Tell the employer why you're a great fit.">{{ form.get('cover_letter', '') }}</textarea>

      <label for="resume">Resume</label>
      <input id="resume" name="resume" type="file" required
             accept=".pdf,.doc,.docx,.txt,.rtf,.odt">
      <p class="muted">Allowed: pdf, doc, docx, txt, rtf, odt &middot; max 5 MB</p>

      <div style="margin-top:16px;">
        <button class="btn" type="submit">Submit application</button>
        <a class="btn secondary" href="{{ url_for('job_detail', job_id=job.id) }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
