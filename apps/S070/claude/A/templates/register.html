{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
  <h1>Create an account</h1>
  <div class="card" style="max-width:480px;">
    <form method="post">
      <label for="name">Name</label>
      <input id="name" name="name" value="{{ form.get('name', '') }}" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ form.get('email', '') }}" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <label for="role">I am an…</label>
      <select id="role" name="role">
        <option value="applicant" {{ 'selected' if form.get('role') == 'applicant' else '' }}>Applicant (looking for a job)</option>
        <option value="employer" {{ 'selected' if form.get('role') == 'employer' else '' }}>Employer (hiring)</option>
      </select>

      <div style="margin-top:16px;">
        <button class="btn" type="submit">Sign up</button>
        <a class="btn secondary" href="{{ url_for('login') }}">I have an account</a>
      </div>
    </form>
  </div>
{% endblock %}
