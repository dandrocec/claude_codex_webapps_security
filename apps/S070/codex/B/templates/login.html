{% extends "base.html" %}
{% block content %}
  <h1>Sign in</h1>
  <form class="stack" method="post" action="{{ url_for('login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Email
      <input name="email" type="email" maxlength="254" required value="{{ form.get('email', '') }}">
    </label>
    <label>Password
      <input name="password" type="password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
{% endblock %}
