{% extends "base.html" %}
{% block content %}
  <h1>Create account</h1>
  <form class="stack" method="post" action="{{ url_for('register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Name
      <input name="name" maxlength="80" required value="{{ form.get('name', '') }}">
    </label>
    <label>Email
      <input name="email" type="email" maxlength="254" required value="{{ form.get('email', '') }}">
    </label>
    <label>Password
      <input name="password" type="password" minlength="12" required>
    </label>
    <label>Account type
      <select name="role" required>
        <option value="">Choose...</option>
        <option value="applicant" {% if form.get('role') == 'applicant' %}selected{% endif %}>Applicant</option>
        <option value="employer" {% if form.get('role') == 'employer' %}selected{% endif %}>Employer</option>
      </select>
    </label>
    <button type="submit">Create account</button>
  </form>
{% endblock %}
