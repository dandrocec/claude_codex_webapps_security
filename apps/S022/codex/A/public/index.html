<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator API</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(92vw, 520px);
        background: #ffffff;
        border: 1px solid #d9e0ec;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
      }

      h1 {
        margin: 0 0 20px;
        font-size: 1.6rem;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        min-width: 0;
        padding: 12px;
        border: 1px solid #b9c3d3;
        border-radius: 6px;
        font-size: 1rem;
      }

      button {
        padding: 12px 18px;
        border: 0;
        border-radius: 6px;
        background: #166534;
        color: #ffffff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #14532d;
      }

      #answer {
        min-height: 28px;
        margin: 18px 0 0;
        font-size: 1.1rem;
        font-weight: 700;
      }

      #answer.error {
        color: #b42318;
      }

      @media (max-width: 480px) {
        main {
          padding: 22px;
        }

        .row {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Calculator</h1>
      <form id="calc-form">
        <label for="expression">Expression</label>
        <div class="row">
          <input id="expression" name="expression" type="text" value="2 + 3 * 4" autocomplete="off">
          <button type="submit">Calculate</button>
        </div>
      </form>
      <p id="answer" aria-live="polite"></p>
    </main>

    <script>
      const form = document.querySelector("#calc-form");
      const expression = document.querySelector("#expression");
      const answer = document.querySelector("#answer");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        answer.className = "";
        answer.textContent = "Calculating...";

        try {
          const response = await fetch("/calc", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ expression: expression.value })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Calculation failed.");
          }

          answer.textContent = `Result: ${data.result}`;
        } catch (error) {
          answer.className = "error";
          answer.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
