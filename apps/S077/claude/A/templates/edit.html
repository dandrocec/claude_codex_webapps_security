{% extends "base.html" %}
{% block title %}{{ "Edit" if page else "New page" }}{% endblock %}
{% block content %}
  <h1>{{ "Edit page" if page else "New page" }}</h1>
  <form method="post">
    {% if not page %}
      <label for="slug">Slug (URL)</label>
      <input type="text" id="slug" name="slug" value="{{ form.slug or '' }}"
             placeholder="getting-started">
    {% else %}
      <p class="muted">/{{ page.slug }}</p>
    {% endif %}

    <label for="title">Title</label>
    <input type="text" id="title" name="title"
           value="{{ form.title if form.title is defined else (rev.title if rev else '') }}">

    <label for="content">Content</label>
    <textarea id="content" name="content">{{ form.content if form.content is defined else (rev.content if rev else '') }}</textarea>

    <label class="row" style="font-weight:400; margin-top:1rem">
      <input type="checkbox" name="editor_only" value="1"
             {% if (form.editor_only if form.editor_only is defined else (page and page.editor_only)) %}checked{% endif %}>
      Editor-only (hidden from viewers)
    </label>

    <p class="row" style="margin-top:1rem">
      <button class="btn" type="submit">Save</button>
      {% if page %}
        <a class="btn secondary" href="{{ url_for('view_page', slug=page.slug) }}">Cancel</a>
      {% else %}
        <a class="btn secondary" href="{{ url_for('index') }}">Cancel</a>
      {% endif %}
    </p>
  </form>
{% endblock %}
