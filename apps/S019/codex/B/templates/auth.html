{% extends "base.html" %}
{% block content %}
  <section class="auth-panel">
    <h1>{{ title }}</h1>
    <form method="post" novalidate>
      {{ form.hidden_tag() }}
      <label>
        <span>Email</span>
        {{ form.email(autocomplete="email") }}
      </label>
      <label>
        <span>Password</span>
        {{ form.password(autocomplete="current-password") }}
      </label>
      {{ form.submit(class_="primary") }}
    </form>
  </section>
{% endblock %}
