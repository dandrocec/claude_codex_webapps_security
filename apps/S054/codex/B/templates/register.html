{% extends "base.html" %}
{% block title %}Register - Time Tracker{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>Create account</h1>
  <form method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email
      <input type="email" name="email" maxlength="254" autocomplete="email" required>
    </label>
    <label>Password
      <input type="password" name="password" minlength="12" autocomplete="new-password" required>
    </label>
    <button type="submit">Create account</button>
  </form>
  <p>Already registered? <a href="{{ url_for('login') }}">Sign in</a></p>
</section>
{% endblock %}
