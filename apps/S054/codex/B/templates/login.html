{% extends "base.html" %}
{% block title %}Sign in - Time Tracker{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>Sign in</h1>
  <form method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email
      <input type="email" name="email" maxlength="254" autocomplete="email" required>
    </label>
    <label>Password
      <input type="password" name="password" minlength="12" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
  <p>No account? <a href="{{ url_for('register') }}">Create one</a></p>
</section>
{% endblock %}
