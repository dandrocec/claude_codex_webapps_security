{% extends "base.html" %}
{% block title %}Sign in | Daily Spark{% endblock %}
{% block content %}
  <section class="form-panel" aria-labelledby="login-heading">
    <h1 id="login-heading">Sign in</h1>
    <form method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" maxlength="32" required pattern="[A-Za-z0-9_]{3,32}">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" minlength="12" required>
      <button class="button primary" type="submit">Sign in</button>
    </form>
  </section>
{% endblock %}
