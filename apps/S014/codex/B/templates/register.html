{% extends "base.html" %}
{% block title %}Create account | Daily Spark{% endblock %}
{% block content %}
  <section class="form-panel" aria-labelledby="register-heading">
    <h1 id="register-heading">Create account</h1>
    <form method="post" action="{{ url_for('register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" maxlength="32" required pattern="[A-Za-z0-9_]{3,32}">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" minlength="12" required>
      <button class="button primary" type="submit">Create account</button>
    </form>
  </section>
{% endblock %}
