{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Log in</h1>
  <form method="post" action="{{ url_for('login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email
      <input type="email" name="email" maxlength="320" required autocomplete="email">
    </label>
    <label>Password
      <input type="password" name="password" maxlength="256" required autocomplete="current-password">
    </label>
    <button type="submit">Log in</button>
  </form>
</section>
{% endblock %}
