{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
  <div class="card narrow">
    <h1>Log in</h1>
    <form method="post" novalidate>
      {{ form.csrf_token }}
      <label>{{ form.username.label }}
        {{ form.username(autocomplete="username") }}</label>
      {% for e in form.username.errors %}<p class="field-error">{{ e }}</p>{% endfor %}

      <label>{{ form.password.label }}
        {{ form.password(autocomplete="current-password") }}</label>
      {% for e in form.password.errors %}<p class="field-error">{{ e }}</p>{% endfor %}

      <button type="submit">Log in</button>
    </form>
    <p>No account? <a href="{{ url_for('auth.register') }}">Register</a></p>
  </div>
{% endblock %}
