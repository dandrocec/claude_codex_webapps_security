{% extends "base.html" %}
{% block title %}Log in · Inventory Tracker{% endblock %}
{% block content %}
<div class="card" style="max-width: 360px; margin: 3rem auto;">
  <h1>Log in</h1>
  <form method="post">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autofocus required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    <div style="margin-top: 1rem;">
      <button type="submit">Log in</button>
    </div>
  </form>
  <p class="muted" style="margin-top: 1rem; font-size: 0.85rem;">
    Default login: <strong>admin</strong> / <strong>admin</strong>
  </p>
</div>
{% endblock %}
