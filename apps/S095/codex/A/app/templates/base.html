<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Job Runner{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d9dee7;
      --text: #1c2430;
      --muted: #657386;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b42318;
      --warn: #a15c07;
      --ok: #157347;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .bar, main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }
    .bar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    main { padding: 28px 0 48px; }
    h1, h2 { line-height: 1.2; margin: 0 0 16px; }
    h1 { font-size: 28px; }
    h2 { font-size: 19px; }
    a { color: var(--accent-dark); }
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }
    label {
      display: block;
      margin: 0 0 6px;
      font-weight: 650;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }
    textarea {
      min-height: 190px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }
    .field { margin-bottom: 14px; }
    button, .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    button:hover, .button:hover { background: var(--accent-dark); }
    .link-button {
      background: transparent;
      color: var(--accent-dark);
      min-height: auto;
      padding: 0;
    }
    .link-button:hover { background: transparent; text-decoration: underline; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    tr:last-child td { border-bottom: 0; }
    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 800;
      background: #eef2f7;
      color: #344054;
    }
    .status.succeeded { background: #e8f5ee; color: var(--ok); }
    .status.failed, .status.timed_out { background: #fdecea; color: var(--danger); }
    .status.running, .status.queued { background: #fff4e5; color: var(--warn); }
    .muted { color: var(--muted); }
    .error {
      margin: 0 0 14px;
      color: var(--danger);
      font-weight: 650;
    }
    pre {
      margin: 0;
      min-height: 120px;
      overflow: auto;
      padding: 14px;
      border-radius: 6px;
      background: #101828;
      color: #e6edf7;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .job-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .meta-item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .meta-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 4px;
    }
    .stack { display: grid; gap: 18px; }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    @media (max-width: 820px) {
      .layout, .job-meta { grid-template-columns: 1fr; }
      .bar { align-items: flex-start; flex-direction: column; padding: 14px 0; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="/">FastAPI Job Runner</a>
      {% if user %}
      <div class="top-actions">
        <span class="muted">{{ user.username }}</span>
        <form method="post" action="/logout">
          <button class="link-button" type="submit">Log out</button>
        </form>
      </div>
      {% endif %}
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
