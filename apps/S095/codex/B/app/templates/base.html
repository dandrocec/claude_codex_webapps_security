<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Job Runner{% endblock %}</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; background: #f4f6f8; color: #17202a; }
      header { background: #263238; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      header a, header button { color: white; }
      main { width: min(1100px, calc(100% - 32px)); margin: 28px auto; }
      a { color: #0b5cab; }
      .panel, .card { background: white; border: 1px solid #d9e0e7; border-radius: 8px; padding: 20px; box-shadow: 0 1px 2px rgba(16, 24, 40, .04); }
      .grid { display: grid; grid-template-columns: minmax(280px, 380px) 1fr; gap: 20px; align-items: start; }
      label { display: block; font-weight: 650; margin: 14px 0 6px; }
      input, select, textarea { width: 100%; box-sizing: border-box; border: 1px solid #b8c4d0; border-radius: 6px; padding: 10px 12px; font: inherit; background: white; }
      textarea { min-height: 180px; resize: vertical; font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
      button, .button { border: 0; border-radius: 6px; background: #1f6feb; color: white; padding: 10px 14px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
      button.secondary { background: transparent; border: 1px solid rgba(255,255,255,.7); }
      table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #d9e0e7; border-radius: 8px; overflow: hidden; }
      th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e6ebf0; vertical-align: top; }
      th { background: #edf2f7; font-size: 14px; }
      code, pre { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
      pre { white-space: pre-wrap; word-break: break-word; background: #101820; color: #e8eef6; border-radius: 8px; padding: 16px; overflow: auto; }
      .flash { background: #fff8d6; border: 1px solid #e4cc66; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; }
      .muted { color: #5d6975; }
      .status { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #edf2f7; font-size: 13px; font-weight: 700; }
      .status.succeeded { background: #dff7e8; color: #176335; }
      .status.failed, .status.timed_out { background: #ffe4e0; color: #9b2317; }
      .status.running, .status.queued { background: #e1efff; color: #114f8f; }
      @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } header { align-items: flex-start; flex-direction: column; } }
    </style>
  </head>
  <body>
    <header>
      <a href="/" style="font-weight: 800; text-decoration: none;">FastAPI Job Runner</a>
      {% if user %}
        <form method="post" action="/logout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <span style="margin-right: 12px;">{{ user.username }}</span>
          <button class="secondary" type="submit">Sign out</button>
        </form>
      {% endif %}
    </header>
    <main>
      {% if flash %}<div class="flash">{{ flash }}</div>{% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
