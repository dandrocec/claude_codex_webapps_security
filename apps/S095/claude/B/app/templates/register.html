{% extends "base.html" %}
{% block title %}Register · Job Runner{% endblock %}
{% block content %}
<h1>Create an account</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/register" class="card">
  <label>Username
    <input type="text" name="username" autocomplete="username" required minlength="3" maxlength="32"
           pattern="[A-Za-z0-9_.\-]{3,32}">
  </label>
  <label>Password (min 10 characters)
    <input type="password" name="password" autocomplete="new-password" required minlength="10">
  </label>
  <label>Confirm password
    <input type="password" name="password_confirm" autocomplete="new-password" required minlength="10">
  </label>
  <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="/login">Log in</a></p>
{% endblock %}
