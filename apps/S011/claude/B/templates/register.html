{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h1>Create an account</h1>
<form class="card" method="post" action="{{ url_for('register') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="username">Username <span class="muted">(3–32 letters/numbers)</span></label>
  <input type="text" id="username" name="username" autocomplete="username" required>
  <label for="password">Password <span class="muted">(at least 10 characters)</span></label>
  <input type="password" id="password" name="password" autocomplete="new-password" required>
  <p><button type="submit">Register</button></p>
</form>
<p class="muted">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
{% endblock %}
