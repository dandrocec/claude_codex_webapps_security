{% extends "base.html" %}
{% block content %}
  <section class="panel auth-panel">
    <h1>Sign in</h1>
    <form method="post" novalidate>
      {{ form.hidden_tag() }}
      <label>
        <span>Email</span>
        {{ form.email(autocomplete="email") }}
      </label>
      <label>
        <span>Password</span>
        {{ form.password(autocomplete="current-password") }}
      </label>
      <button type="submit">Sign in</button>
    </form>
    <p class="muted">Need an account? <a href="{{ url_for('register') }}">Create one</a>.</p>
  </section>
{% endblock %}
