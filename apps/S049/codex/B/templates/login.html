{% extends "base.html" %}
{% set title = "Sign in" %}
{% block content %}
<section class="auth">
  <h1>Editor Sign In</h1>
  <form method="post" action="{{ url_for('login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email
      <input name="email" type="email" maxlength="254" autocomplete="email" required>
    </label>
    <label>Password
      <input name="password" type="password" minlength="12" maxlength="256" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
