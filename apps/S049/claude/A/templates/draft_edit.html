{% extends "base.html" %}
{% block title %}{{ 'Edit draft' if draft else 'New draft' }} · Newsletter Manager{% endblock %}
{% block content %}
<div class="card-head bare">
  <h1>{{ 'Edit draft' if draft else 'New draft' }}</h1>
  {% if draft %}
    <a class="btn" href="{{ url_for('preview_draft', draft_id=draft.id) }}" target="_blank">Open preview ↗</a>
  {% endif %}
</div>

<div class="card">
  <form method="post"
        action="{{ url_for('edit_draft', draft_id=draft.id) if draft else url_for('new_draft') }}">
    <label>
      Subject
      <input type="text" name="subject" value="{{ draft.subject if draft else '' }}"
             placeholder="Your newsletter subject line" autofocus>
    </label>
    <label>
      Body
      <textarea name="body" rows="16"
                placeholder="Write your newsletter here...">{{ draft.body if draft else '' }}</textarea>
    </label>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Save changes' if draft else 'Create draft' }}</button>
      <a class="btn" href="{{ url_for('drafts') }}">Back to drafts</a>
    </div>
  </form>
</div>
{% endblock %}
