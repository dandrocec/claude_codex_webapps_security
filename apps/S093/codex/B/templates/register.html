{% extends "base.html" %}
{% block title %}Create account{% endblock %}
{% block content %}
  <section class="panel">
    <h1>Create account</h1>
    <form class="stack" method="post" action="{{ url_for('register') }}" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>
        Username
        <input name="username" pattern="[A-Za-z0-9_]{3,32}" maxlength="32" required>
      </label>
      <label>
        Password
        <input name="password" type="password" minlength="12" required autocomplete="new-password">
      </label>
      <button type="submit">Create account</button>
    </form>
  </section>
{% endblock %}
