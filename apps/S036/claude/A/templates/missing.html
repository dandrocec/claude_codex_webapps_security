{% extends "base.html" %}
{% block title %}{{ title }} (missing) — Wiki{% endblock %}
{% block content %}
  <h1>{{ title }}</h1>
  <p class="empty">This page doesn’t exist yet.</p>
  {% if current_user %}
    <a class="btn" href="{{ url_for('edit_page', title=title) }}">Create it</a>
  {% else %}
    <p><a href="{{ url_for('login') }}">Log in</a> to create it.</p>
  {% endif %}
{% endblock %}
