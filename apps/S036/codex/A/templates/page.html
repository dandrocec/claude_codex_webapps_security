{% extends "base.html" %}

{% block title %}{{ page.title }} - Flask Wiki{% endblock %}

{% block content %}
  <article class="wiki-page">
    <header class="page-heading">
      <div>
        <h1>{{ page.title }}</h1>
        <p>By {{ page.author }} · Updated {{ page.updated_at }}</p>
      </div>
      {% if g.user %}
        <a class="button" href="{{ url_for('edit_page', slug=page.slug) }}">Edit</a>
      {% endif %}
    </header>
    <div class="markdown-body">
      {{ page.body|markdown }}
    </div>
  </article>
{% endblock %}
