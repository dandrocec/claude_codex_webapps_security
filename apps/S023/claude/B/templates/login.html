{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
  <h1>Log in</h1>
  <form method="post" action="{{ url_for('login') }}">
    {{ form.csrf_token }}
    <label>Username {{ form.username(autocomplete="username") }}</label>
    <label>Password {{ form.password(autocomplete="current-password") }}</label>
    <button type="submit">Log in</button>
  </form>
  <p class="hint">No account? <a href="{{ url_for('register') }}">Register</a>.</p>
{% endblock %}
