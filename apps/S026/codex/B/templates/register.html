{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
  <section class="form-panel narrow">
    <h1>Register</h1>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="username">Username</label>
      <input id="username" name="username" minlength="3" maxlength="32" pattern="[A-Za-z0-9_]{3,32}" autocomplete="username" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" minlength="12" maxlength="128" autocomplete="new-password" required>

      <button type="submit">Create account</button>
    </form>
  </section>
{% endblock %}
