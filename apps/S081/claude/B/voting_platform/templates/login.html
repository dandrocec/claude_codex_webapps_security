{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
  <h1>Log in</h1>
  <form method="post" class="stack" novalidate>
    {{ form.csrf_token }}
    <label>{{ form.username.label }}
      {{ form.username(autocomplete="username") }}
    </label>
    {% for e in form.username.errors %}<span class="err">{{ e }}</span>{% endfor %}

    <label>{{ form.password.label }}
      {{ form.password(autocomplete="current-password") }}
    </label>
    {% for e in form.password.errors %}<span class="err">{{ e }}</span>{% endfor %}

    <button type="submit">Log in</button>
  </form>
  <p class="muted">No account? <a href="{{ url_for('register') }}">Register</a>.</p>
{% endblock %}
